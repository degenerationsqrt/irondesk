    s.src = url; s.onload = function(){ res(); }; s.onerror = function(){ rej(new Error('failed '+url)); };
    document.head.appendChild(s);

  function loadLib(i){
    if (i >= libs.length) return Promise.resolve();
    var path = libs[i][0], check = libs[i][1], required = libs[i][2];
    return load(cdns[0] + path)
      .catch(function(){ return load(cdns[1] + path); })
      .catch(function(e){ if (required) throw e; })
      .then(function(){

        return loadLib(i + 1);
      });
  }

  function loadFirebase(i){
    if (i >= firebaseLibs.length) return Promise.resolve();
    return load(firebaseLibs[i]).then(function(){ return loadFirebase(i + 1); }).catch(function(){ return; });

function solveLoadout(targetTotal, bar, pairs) {
  const perSide = Math.max(0, (targetTotal - bar) / 2);
  const denoms = pairs.filter(p => p.weight > 0 && Math.floor(p.count / 2) > 0).map(p => ({
    w: p.weight,
    n: Math.floor(p.count / 2)
  })).sort((a, b) => b.w - a.w);
  let best = {
    sum: 0,
    combo: []
  };
  const maxD = denoms.reduce((a, d) => Math.max(a, d.w), 0);
  const go = (i, sum, combo) => {
    if (Math.abs(sum - perSide) < Math.abs(best.sum - perSide)) best = {
      sum,
      combo: [...combo]
    };
    if (i >= denoms.length || sum > perSide + maxD) return;
    for (let k = denoms[i].n; k >= 0; k--) go(i + 1, sum + k * denoms[i].w, [...combo, ...Array(k).fill(denoms[i].w)]);
  };
  go(0, 0, []);
  const counts = {};
  best.combo.forEach(w => counts[w] = (counts[w] || 0) + 1);
  return {
    total: bar + best.sum * 2,
    counts
  };
}

function pick(arr, n) {
  return arr[(n % arr.length + arr.length) % arr.length];
}
function poolFor(group, mode) {
  return LIB[group].filter(m => m.eq === "both" || m.eq === mode);
}

/* Build one day's workout from goal + focus + location + week (for variation + deload) */
function generateDay(focusKey, goalKey, mode, blockNum, weekIdx, tm, roundLoad) {
  const f = FOCUS[focusKey] || FOCUS.Upper;
  const goal = GOALS[goalKey] || GOALS.vtaper;
  const deload = (weekIdx % 6 + 6) % 6 === 5;
  const st = STYLES[goal.style];
  const rows = [];
  let slotN = blockNum * 7 + weekIdx; // rotates exercises each week/block
  f.pools.forEach(([group, count]) => {
    const pool = poolFor(group, mode);
    for (let i = 0; i < count; i++) {
      const ex = pick(pool, slotN++);
      const isComp = f.lift && rows.filter(r => r.role === "comp").length === 0 && group !== "Calves";
      const sc = isComp ? st.comp : i === 0 ? st.acc : st.iso;
      const target = isComp && f.lift ? roundLoad(tm(f.lift) * st.comp.pct * (deload ? 0.85 : 1)) : null;
      rows.push({
        ex: ex.n,
        role: isComp ? "comp" : i === 0 ? "acc" : "iso",
        lift: isComp ? f.lift : null,
        heavy: isComp && !deload && goal.style === "strength",
        drop: !isComp && goal.style !== "strength" && !deload && i > 0,
        sets: deload ? Math.max(2, sc.sets - 1) : sc.sets,
        reps: sc.reps,
        target,
        note: group === "Glutes" ? "Glute focus" : ""
      });
    }
  });
  // daily core (reps only, no weight) + cardio (minutes only)
  rows.push({
    ex: pick(poolFor("Core", mode), blockNum + weekIdx).n,
    role: "ab",
    sets: 3,
    reps: deload ? 12 : 15,
    target: null,
    heavy: false,
    drop: false,
    note: "Bodyweight — no load needed"
  });
  const isHeavy = goal.style === "strength";
  const cardio = focusKey === "Cond" ? CARDIO_BY_FOCUS.cond : isHeavy ? CARDIO_BY_FOCUS.heavy : CARDIO_BY_FOCUS.pump;
  const cmin = Math.round(cardio[1] * (deload ? 0.6 : 1) / 5) * 5;
  rows.push({
    ex: `${cardio[0]} — ${cmin} min`,
    role: "cardio",
    sets: 1,
    reps: cmin,
    target: null,
    heavy: false,
    drop: false,
    note: isHeavy ? "Zone 2 — easy" : "Steady pace"
  });
  return {
    id: f.title,
    focusKey,
    type: isHeavy ? "heavy" : "pump",
    deload,
    style: goal.style,
    rows
  };
}

    return window.firebase.auth();
  }
  function db() {
    return window.firebase.firestore();
  }
  return {
    ready: ready,
    onAuth: function (cb) {
      if (!ready) {
        cb(null);
        return function () {};
      }
      return auth().onAuthStateChanged(cb);
    },
    signUp: function (email, pw, name) {
      return auth().createUserWithEmailAndPassword(email, pw).then(function (c) {
        return c.user.updateProfile({
          displayName: name

          return db().collection("users").doc(c.user.uid).set({
            name: name,
            email: email
          }, {
            merge: true
          });
        }).then(function () {
          return c.user;
        });
      });
    },
    signIn: function (email, pw) {
      return auth().signInWithEmailAndPassword(email, pw);

    signOut: function () {
