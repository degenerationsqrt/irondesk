/* sequential loader with CDN fallback: jsDelivr first, unpkg second */
(function(){
  var libs = [
    ["npm/react@18.3.1/umd/react.production.min.js", function(){ return window.React; }, true],
    ["npm/react-dom@18.3.1/umd/react-dom.production.min.js", function(){ return window.ReactDOM; }, true],

  ];
  var cdns = ["https://cdn.jsdelivr.net/", "https://unpkg.com/"];

  function load(url){ return new Promise(function(res, rej){
    var s = document.createElement('script');
    s.src = url; s.onload = function(){ res(); }; s.onerror = function(){ rej(new Error('failed '+url)); };
    document.head.appendChild(s);
  }); }

  function loadLib(i){
    if (i >= libs.length) return Promise.resolve();
    var path = libs[i][0], check = libs[i][1], required = libs[i][2];
    return load(cdns[0] + path)
      .catch(function(){ return load(cdns[1] + path); })
      .catch(function(e){ if (required) throw e; })
      .then(function(){
        if (required && !check()) throw new Error('library missing after load: ' + path);
        return loadLib(i + 1);
      });
  }

  loadLib(0).then(function(){
    try { runApp(); }
    catch(e){ window.onerror(e.message, 'app', 0); }
  }).catch(function(e){
    var el = document.getElementById('booterr');
    if (el) el.innerHTML = '<br/>Could not load libraries — check your internet connection and reload.<br/>' + e.message;
  });
})();

function solveLoadout(targetTotal, bar, pairs) {
  const perSide = Math.max(0, (targetTotal - bar) / 2);
  const denoms = pairs.filter(p => p.weight > 0 && Math.floor(p.count / 2) > 0).map(p => ({
    w: p.weight,
    n: Math.floor(p.count / 2)
  })).sort((a, b) => b.w - a.w);

    sum: 0,
    combo: []
  };
  const maxD = denoms.reduce((a, d) => Math.max(a, d.w), 0);

    if (Math.abs(sum - perSide) < Math.abs(best.sum - perSide)) best = {
      sum,
      combo: [...combo]
    };
    if (i >= denoms.length || sum > perSide + maxD) return;
    for (let k = denoms[i].n; k >= 0; k--) go(i + 1, sum + k * denoms[i].w, [...combo, ...Array(k).fill(denoms[i].w)]);
  };
  go(0, 0, []);
  const counts = {};
  best.combo.forEach(w => counts[w] = (counts[w] || 0) + 1);
  return {
    total: bar + best.sum * 2,
    counts
  };
