/* localStorage persistence shim (replaces Claude artifact storage) */
window.storage = {
  async get(key) {
    const v = localStorage.getItem(key);
    return v == null ? null : { key, value: v };
  },
  async set(key, value) {
    localStorage.setItem(key, value);
    return { key, value };

};



/* ============ MATH ============ */
const epley = (w, r) => (r <= 1 ? w : w * (1 + r / 30));
const wForReps = (e, r) => e / (1 + r / 30);
const today = () => new Date().toISOString().slice(0, 10);
const uid = () => Math.random().toString(36).slice(2, 9);

function solveLoadout(targetTotal, bar, pairs) {
  const perSide = Math.max(0, (targetTotal - bar) / 2);
  const denoms = pairs.filter((p) => p.weight > 0 && Math.floor(p.count / 2) > 0)
    .map((p) => ({ w: p.weight, n: Math.floor(p.count / 2) })).sort((a, b) => b.w - a.w);
  let best = { sum: 0, combo: [] };
  const maxD = denoms.reduce((a, d) => Math.max(a, d.w), 0);
  const go = (i, sum, combo) => {
    if (Math.abs(sum - perSide) < Math.abs(best.sum - perSide)) best = { sum, combo: [...combo] };
    if (i >= denoms.length || sum > perSide + maxD) return;
    for (let k = denoms[i].n; k >= 0; k--) go(i + 1, sum + k * denoms[i].w, [...combo, ...Array(k).fill(denoms[i].w)]);
  };
  go(0, 0, []);
  const counts = {};
  best.combo.forEach((w) => (counts[w] = (counts[w] || 0) + 1));
  return { total: bar + best.sum * 2, counts };
}

const RULES = [
  "Heavy compounds (3–5 reps) are the muscle-protecting signal. Never drop-set them.",
  "Protein ~1g per lb of target bodyweight daily, front-loaded early.",
  "Drop sets only on isolation last sets. Max 2–3 per session.",
  "Rate of loss ~1–2 lb/week. Faster = lean mass going.",
  "Safety pins set before every heavy solo bench or squat.",
  "All reps clean → +5 lb upper / +10 lb lower. Miss → repeat.",
];

/* ============ THEME ============ */
const C = {
  bg: "#0b0b0d", panel: "#151518", panel2: "#1d1d22", line: "#27272e",
  red: "#e11d2a", blue: "#3b9ae1", gold: "#d9a441", green: "#4ade80",

/* ============ APP ============ */
function IronDesk() {
  const [tab, setTab] = useState("today");
  const [mode, setMode] = useState("home");
  const [maxes, setMaxes] = useState(D_MAXES);
  const [homePlates, setHomePlates] = useState(D_HOME);
  const [gymPlates, setGymPlates] = useState(D_GYM);
  const [bar, setBar] = useState(45);
  const [sessions, setSessions] = useState([]);
  const [bwLog, setBwLog] = useState([]);
  const [cardioLog, setCardioLog] = useState([]);
  const [active, setActive] = useState(null); // live workout
  const [loaded, setLoaded] = useState(false);
  const [flash, setFlash] = useState("");

  useEffect(() => { (async () => {
    try {
      const r = await window.storage.get("irondesk:v3");
      if (r && r.value) {
        const s = JSON.parse(r.value);
        s.maxes && setMaxes(s.maxes); s.homePlates && setHomePlates(s.homePlates);
        s.gymPlates && setGymPlates(s.gymPlates); s.bar && setBar(s.bar);
        s.mode && setMode(s.mode); s.sessions && setSessions(s.sessions);
        s.bwLog && setBwLog(s.bwLog); s.cardioLog && setCardioLog(s.cardioLog);
        s.active && setActive(s.active);
      } else {
        // migrate from v2 if present
        try {
          const old = await window.storage.get("irondesk:v2");
          if (old && old.value) {
            const s = JSON.parse(old.value);
            s.maxes && setMaxes(s.maxes); s.plates && setHomePlates(s.plates);
            s.gymPlates && setGymPlates(s.gymPlates); s.bar && setBar(s.bar);
            s.bwLog && setBwLog(s.bwLog); s.cardioLog && setCardioLog(s.cardioLog);
          }
        } catch (e) {}
      }
    } catch (e) {}
    setLoaded(true);
  })(); }, []);

  const persist = async () => {
    try {
      await window.storage.set("irondesk:v3", JSON.stringify({ maxes, homePlates, gymPlates, bar, mode, sessions, bwLog, cardioLog, active }));
    } catch (e) {}
  };
  useEffect(() => { if (loaded) persist(); /* eslint-disable-next-line */ }, [maxes, homePlates, gymPlates, bar, mode, sessions, bwLog, cardioLog, active, loaded]);

  const note = (m) => { setFlash(m); setTimeout(() => setFlash(""), 1600); };
  const plates = mode === "gym" ? gymPlates : homePlates;
  const setPlates = mode === "gym" ? setGymPlates : setHomePlates;
  const roundLoad = (x) => (mode === "gym" ? Math.round(x / 2.5) * 2.5 : Math.round(x / 5) * 5);
  const tm = (k) => Math.round(maxes[k] * 0.9);

  // PR map: best e1RM per exercise across all finished sessions
  const prMap = useMemo(() => {
    const m = {};
    sessions.forEach((s) => s.entries.forEach((en) => en.sets.forEach((st) => {
      if (!st.w || !st.r) return;
      const e = epley(st.w, st.r);
      if (!m[en.ex] || e > m[en.ex]) m[en.ex] = e;
    })));
    return m;
  }, [sessions]);

  const exportData = () => {
    const data = { maxes, homePlates, gymPlates, bar, mode, sessions, bwLog, cardioLog, _app: "IronDesk", _v: 3, _exported: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `irondesk-backup-${today()}.json`;
    document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
    note("Exported");
  };
  const importData = (file) => {
    if (!file) return;
    const rd = new FileReader();
    rd.onload = () => {
      try {
        const s = JSON.parse(rd.result);
        s.maxes && setMaxes(s.maxes); s.homePlates && setHomePlates(s.homePlates);
        s.plates && setHomePlates(s.plates); s.gymPlates && setGymPlates(s.gymPlates);
        s.bar && setBar(s.bar); s.mode && setMode(s.mode);
        s.sessions && setSessions(s.sessions);
        // v2 logs → keep bw/cardio
        s.bwLog && setBwLog(s.bwLog); s.cardioLog && setCardioLog(s.cardioLog);
        note("Imported");
      } catch (e) { note("Import failed"); }
    };
    rd.readAsText(file);
  };

  const TABS = [
    ["today", "Today"], ["program", "Program"], ["history", "History"],
    ["trends", "Trends"], ["tools", "Tools"], ["settings", "Settings"],
  ];

  return (
    <div style={{ minHeight: "100vh", background: C.bg, color: C.txt, paddingBottom: 50, fontFamily: "'Archivo',-apple-system,sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Archivo:wght@400;500;600;700&display=swap');
        input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
        input[type=number]{-moz-appearance:textfield;} select{-webkit-appearance:none;appearance:none;}
        .ttl{font-family:'Oswald',sans-serif;text-transform:uppercase;letter-spacing:1px;}
        .tabbar::-webkit-scrollbar{display:none;}
        button{transition:all .15s;}
      `}</style>

      <header style={{ background: "linear-gradient(150deg,#17171b 0%,#0b0b0d 70%)", borderBottom: `2px solid ${C.red}`, padding: "20px 18px 0" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div className="ttl" style={{ fontSize: 26, fontWeight: 700, lineHeight: 1 }}>IRON<span style={{ color: C.red }}>DESK</span> <span style={{ fontSize: 10, color: C.dim, letterSpacing: 2 }}>PRO</span></div>
            <div style={{ color: C.dim, fontSize: 11.5, marginTop: 4 }}>{flash ? <span style={{ color: C.green }}>{flash}</span> : "Strength training system"}</div>
          </div>
          <div style={{ display: "flex", gap: 4, background: "#1f1f25", borderRadius: 8, padding: 3 }}>
            {[["home", "Home"], ["gym", "Gym"]].map(([m, l]) => (
              <button key={m} onClick={() => setMode(m)} className="ttl" style={{
                padding: "6px 12px", borderRadius: 6, border: "none", cursor: "pointer", fontSize: 11, fontWeight: 700,
                background: mode === m ? C.red : "transparent", color: mode === m ? "#fff" : C.dim,
              }}>{l}</button>
            ))}
          </div>
        </div>
        <nav className="tabbar" style={{ display: "flex", gap: 0, marginTop: 14, overflowX: "auto" }}>
          {TABS.map(([k, l]) => (
            <button key={k} onClick={() => setTab(k)} className="ttl" style={{
              background: "none", border: "none", borderBottom: tab === k ? `2px solid ${C.red}` : "2px solid transparent",
              color: tab === k ? C.txt : C.dim, padding: "9px 13px", fontSize: 12.5, fontWeight: 600, cursor: "pointer", whiteSpace: "nowrap",
            }}>{l}{k === "today" && active ? " ●" : ""}</button>
          ))}
        </nav>
      </header>

      <main style={{ maxWidth: 560, margin: "0 auto", padding: "16px 14px" }}>
        {tab === "today" && <Today {...{ mode, maxes, tm, roundLoad, plates, bar, active, setActive, sessions, setSessions, prMap, note, setTab }} />}
        {tab === "program" && <ProgramTab {...{ mode }} />}
        {tab === "history" && <History {...{ sessions, setSessions }} />}
        {tab === "trends" && <Trends {...{ sessions, bwLog, setBwLog, cardioLog, setCardioLog }} />}
        {tab === "tools" && <Tools {...{ mode, plates, bar, roundLoad, maxes }} />}
        {tab === "settings" && <Settings {...{ maxes, setMaxes, plates, setPlates, bar, setBar, mode, exportData, importData, sessions }} />}
      </main>
    </div>
  );
}

/* ============ TODAY (live workout) ============ */
function Today({ mode, maxes, tm, roundLoad, plates, bar, active, setActive, sessions, setSessions, prMap, note, setTab }) {
  const program = PROGRAMS[mode];
  const [timer, setTimer] = useState(0);
  const timerRef = useRef(null);

  useEffect(() => {
    if (timer > 0 && !timerRef.current) {
      timerRef.current = setInterval(() => setTimer((t) => {
        if (t <= 1) { clearInterval(timerRef.current); timerRef.current = null; return 0; }
        return t - 1;
      }), 1000);
    }
    return () => { if (timer === 0 && timerRef.current) { clearInterval(timerRef.current); timerRef.current = null; } };
  }, [timer]);

  const start = (day) => {
    const d = program.find((x) => x.id === day);
    const targetFor = (row) => row.lift ? roundLoad(tm(row.lift) * 0.87) : null;
    setActive({
      id: uid(), date: today(), dayId: day, mode, start: Date.now(),
      entries: d.rows.map((r) => ({
        ex: r.ex, heavy: !!r.heavy, drop: !!r.drop, note: r.note || "", lift: r.lift || null,
        target: targetFor(r), targetReps: r.reps,
        sets: Array(r.sets).fill(null).map(() => ({ w: targetFor(r) || "", r: r.reps, done: false })),
      })),
    });
  };

  const setSet = (ei, si, field, val) => {
    const a = { ...active, entries: active.entries.map((en, i) => i !== ei ? en : {
      ...en, sets: en.sets.map((s, j) => j !== si ? s : { ...s, [field]: val }),
    })};
    setActive(a);
  };
  const toggleDone = (ei, si) => {
    const en = active.entries[ei]; const s = en.sets[si];
    const nowDone = !s.done;
    setSet(ei, si, "done", nowDone);
    if (nowDone) setTimer(en.heavy ? 180 : 60);
  };
  const addSet = (ei) => {
    const a = { ...active, entries: active.entries.map((en, i) => i !== ei ? en : {
      ...en, sets: [...en.sets, { w: en.sets[en.sets.length - 1]?.w || "", r: en.targetReps, done: false }],
    })};
    setActive(a);
  };

  const finish = () => {
    const entries = active.entries.map((en) => ({ ex: en.ex, heavy: en.heavy, lift: en.lift,
      sets: en.sets.filter((s) => s.done && Number(s.w) >= 0 && Number(s.r) > 0).map((s) => ({ w: Number(s.w), r: Number(s.r) })) }))
      .filter((en) => en.sets.length > 0);
    if (entries.length === 0) { note("Nothing logged"); return; }
    const volume = entries.reduce((a, en) => a + en.sets.reduce((b, s) => b + s.w * s.r, 0), 0);
    const prs = [];
    entries.forEach((en) => {
      const best = Math.max(...en.sets.map((s) => epley(s.w, s.r)));
      if (best > (prMap[en.ex] || 0)) prs.push({ ex: en.ex, e1rm: Math.round(best) });
    });
    const session = { id: active.id, date: active.date, dayId: active.dayId, mode: active.mode,
      durationMin: Math.max(1, Math.round((Date.now() - active.start) / 60000)), entries, volume, prs };
    setSessions([session, ...sessions]);
    setActive(null); setTimer(0);
    note(prs.length ? `Done — ${prs.length} PR${prs.length > 1 ? "s" : ""}!` : "Workout saved");
    setTab("history");
  };

  if (!active) {
    const lastByDay = {};
    sessions.forEach((s) => { if (!lastByDay[s.dayId]) lastByDay[s.dayId] = s.date; });
    return (
      <>
        <Panel title="Start a Workout" sub={`${mode === "gym" ? "Gym" : "Home"} program · pick today's muscle`}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            {program.map((d) => (
              <button key={d.id} onClick={() => start(d.id)} style={{
                background: C.panel2, border: `1px solid ${d.type === "heavy" ? C.red : C.blue}`, borderRadius: 12,
                padding: "14px 10px", cursor: "pointer", textAlign: "left",
              }}>
                <div className="ttl" style={{ fontSize: 15, fontWeight: 700, color: C.txt }}>{d.id}</div>
                <div style={{ fontSize: 10, fontWeight: 700, color: d.type === "heavy" ? C.red : C.blue, letterSpacing: 0.8, marginTop: 2 }}>
                  {d.type === "heavy" ? "HEAVY" : "PUMP"}</div>
                <div style={{ fontSize: 10.5, color: C.dim, marginTop: 4 }}>
                  {lastByDay[d.id] ? `Last: ${lastByDay[d.id].slice(5)}` : "Not trained yet"}</div>
              </button>
            ))}
          </div>
        </Panel>
        <WeekSummary sessions={sessions} />
      </>
    );
  }

  const day = program.find((d) => d.id === active.dayId);
  const doneCount = active.entries.reduce((a, en) => a + en.sets.filter((s) => s.done).length, 0);
  const totalCount = active.entries.reduce((a, en) => a + en.sets.length, 0);

  return (
    <>
      {timer > 0 && (
        <div style={{ position: "sticky", top: 8, zIndex: 5, background: C.red, borderRadius: 12, padding: "12px 16px",
          display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, boxShadow: "0 4px 20px rgba(225,29,42,.35)" }}>
          <span className="ttl" style={{ fontSize: 13, fontWeight: 700, color: "#fff" }}>REST</span>
          <span className="ttl" style={{ fontSize: 26, fontWeight: 700, color: "#fff" }}>

        {active.entries.map((en, ei) => (
          <div key={ei} style={{ marginBottom: 18, background: C.panel2, borderRadius: 12, padding: "12px 12px 8px", border: `1px solid ${C.line}` }}>

            </div>
            {(en.note || en.target) && <div style={{ fontSize: 11, color: C.dim, marginBottom: 8 }}>

            {en.target && <div style={{ marginBottom: 8 }}><LoadChips total={en.target} bar={bar} plates={plates} /></div>}
            {en.sets.map((s, si) => (
              <div key={si} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0" }}>
                <span style={{ width: 22, fontSize: 11, color: C.dim, fontWeight: 700 }}>{si + 1}</span>
                <MiniIn value={s.w} onChange={(v) => setSet(ei, si, "w", v)} suffix="lb" />
                <span style={{ color: C.dim, fontSize: 12 }}>×</span>

                <button onClick={() => toggleDone(ei, si)} style={{
                  width: 70, padding: "8px 0", borderRadius: 8, border: `1px solid ${s.done ? C.green : C.line}`,
                  background: s.done ? "rgba(74,222,128,.15)" : C.panel, color: s.done ? C.green : C.dim,
                  fontWeight: 700, fontSize: 12, cursor: "pointer",
                }}>{s.done ? "✓ DONE" : "LOG"}</button>
              </div>
            ))}
            <button onClick={() => addSet(ei)} style={{ background: "none", border: "none", color: C.dim, fontSize: 12, cursor: "pointer", padding: "6px 0" }}>+ add set</button>
          </div>
        ))}
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={() => { if (window.confirm("Discard this workout?")) { setActive(null); setTimer(0); } }} style={{
            flex: 1, padding: "13px", background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 10, color: C.dim,
            fontFamily: "'Oswald'", fontSize: 13, fontWeight: 600, letterSpacing: 1, textTransform: "uppercase", cursor: "pointer" }}>Discard</button>
          <button onClick={finish} style={{
            flex: 2, padding: "13px", background: C.red, border: "none", borderRadius: 10, color: "#fff",
            fontFamily: "'Oswald'", fontSize: 14, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", cursor: "pointer" }}>Finish Workout</button>
        </div>
      </Panel>
    </>
  );
}

function WeekSummary({ sessions }) {
  const cut = new Date(Date.now() - 7 * 864e5).toISOString().slice(0, 10);
  const wk = sessions.filter((s) => s.date >= cut);
  const vol = wk.reduce((a, s) => a + s.volume, 0);
  const prs = wk.reduce((a, s) => a + (s.prs?.length || 0), 0);
  return (
    <Panel title="Last 7 Days" sub="Rolling week at a glance">
      <div style={{ display: "flex", gap: 10, textAlign: "center" }}>
        <Stat label="Sessions" value={wk.length} color={C.txt} />
        <Stat label="Volume (lb)" value={vol.toLocaleString()} color={C.gold} />
        <Stat label="PRs" value={prs} color={C.green} />
      </div>
    </Panel>
  );
}

/* ============ HISTORY ============ */

    <>

                  {s.prs?.length > 0 && <Badge color={C.green}>{s.prs.length} PR</Badge>}

/* ============ TRENDS ============ */
function Trends({ sessions, bwLog, setBwLog, cardioLog, setCardioLog }) {
  const [sel, setSel] = useState("bench");
  const [bw, setBw] = useState({ date: today(), weight: 239 });
  const [cd, setCd] = useState({ date: today(), type: "Bike", minutes: 30 });

  const liftName = LIFTS.find((l) => l.key === sel)?.name;
  const e1rmData = useMemo(() => {
    const pts = [];
    [...sessions].reverse().forEach((s) => s.entries.forEach((en) => {
      if (en.lift === sel || en.ex === liftName) {
        const best = Math.max(...en.sets.map((st) => epley(st.w, st.r)));
        pts.push({ date: s.date, e1rm: Math.round(best) });
      }
    }));
    return pts;
  }, [sessions, sel, liftName]);

  const volData = useMemo(() => {
    const byWeek = {};
    sessions.forEach((s) => {
      const d = new Date(s.date); const wk = new Date(d); wk.setDate(d.getDate() - d.getDay());
      const k = wk.toISOString().slice(5, 10);
      byWeek[k] = (byWeek[k] || 0) + s.volume;
    });
    return Object.entries(byWeek).sort((a, b) => a[0].localeCompare(b[0])).slice(-8).map(([w, v]) => ({ week: w, volume: v }));
  }, [sessions]);

  const bwData = useMemo(() => [...bwLog].sort((a, b) => a.date.localeCompare(b.date)), [bwLog]);
  const addBw = () => { if (!Number(bw.weight)) return; setBwLog([{ id: uid(), date: bw.date, weight: Number(bw.weight) }, ...bwLog.filter((x) => x.date !== bw.date)]); };
  const addCd = () => { if (!Number(cd.minutes)) return; setCardioLog([{ id: uid(), ...cd, minutes: Number(cd.minutes) }, ...cardioLog]); };
  const ttStyle = { contentStyle: { background: C.panel, border: `1px solid ${C.line}`, borderRadius: 8, fontSize: 12 }, labelStyle: { color: C.dim } };

  return (
    <>
      <Panel title="Strength Trend" sub="e1RM from your logged sessions — flat or rising while weight drops = recomp working">
        <div style={{ display: "flex", gap: 6, marginBottom: 10, flexWrap: "wrap" }}>
          {LIFTS.map((l) => (
            <button key={l.key} onClick={() => setSel(l.key)} style={{
              background: sel === l.key ? LIFT_COLORS[l.key] : C.panel2, color: sel === l.key ? "#fff" : C.dim,
              border: `1px solid ${C.line}`, borderRadius: 6, padding: "5px 10px", fontSize: 12, cursor: "pointer", fontWeight: 600 }}>{l.name}</button>
          ))}
        </div>
        {e1rmData.length < 2 ? <Empty text="Finish 2+ workouts containing this lift." /> : (
          <ResponsiveContainer width="100%" height={190}>
            <LineChart data={e1rmData} margin={{ top: 6, right: 8, left: -16, bottom: 0 }}>
              <CartesianGrid stroke={C.line} strokeDasharray="2 4" />
              <XAxis dataKey="date" tick={{ fill: C.dim, fontSize: 10 }} tickFormatter={(d) => d.slice(5)} />
              <YAxis tick={{ fill: C.dim, fontSize: 10 }} domain={["dataMin - 15", "dataMax + 15"]} />
              <Tooltip {...ttStyle} />
              <Line type="monotone" dataKey="e1rm" stroke={LIFT_COLORS[sel]} strokeWidth={2.5} dot={{ r: 3 }} />
            </LineChart>
          </ResponsiveContainer>
        )}
      </Panel>

      <Panel title="Weekly Volume" sub="Total pounds moved per week — watch for sudden drops (recovery) or runaway climbs">
        {volData.length < 2 ? <Empty text="Finish workouts across 2+ weeks." /> : (
          <ResponsiveContainer width="100%" height={160}>
            <BarChart data={volData} margin={{ top: 6, right: 8, left: -10, bottom: 0 }}>
              <CartesianGrid stroke={C.line} strokeDasharray="2 4" />
              <XAxis dataKey="week" tick={{ fill: C.dim, fontSize: 10 }} />
              <YAxis tick={{ fill: C.dim, fontSize: 10 }} />
              <Tooltip {...ttStyle} />
              <Bar dataKey="volume" fill={C.gold} radius={[4, 4, 0, 0]} />
            </BarChart>
          </ResponsiveContainer>
        )}
      </Panel>

      <Panel title="Bodyweight" sub="Target ~1–2 lb/week down">
        <div style={{ display: "flex", gap: 8, alignItems: "flex-end", marginBottom: 10 }}>
          <input type="date" value={bw.date} onChange={(e) => setBw({ ...bw, date: e.target.value })} style={inp(120)} />
          <MiniIn value={bw.weight} onChange={(v) => setBw({ ...bw, weight: v })} suffix="lb" />
          <button onClick={addBw} style={btnSm()}>+ Log</button>
        </div>
        {bwData.length >= 2 && (
          <ResponsiveContainer width="100%" height={160}>
            <LineChart data={bwData} margin={{ top: 6, right: 8, left: -16, bottom: 0 }}>
              <CartesianGrid stroke={C.line} strokeDasharray="2 4" />
              <XAxis dataKey="date" tick={{ fill: C.dim, fontSize: 10 }} tickFormatter={(d) => d.slice(5)} />
              <YAxis tick={{ fill: C.dim, fontSize: 10 }} domain={["dataMin - 4", "dataMax + 4"]} />
              <Tooltip {...ttStyle} />
              <Line type="monotone" dataKey="weight" stroke={C.gold} strokeWidth={2.5} dot={{ r: 3 }} />
            </LineChart>
          </ResponsiveContainer>
        )}
        {bwData.slice(-3).reverse().map((x) => (
          <div key={x.id} style={{ display: "flex", gap: 10, padding: "5px 0", fontSize: 13, borderBottom: `1px solid ${C.line}` }}>
            <span style={{ flex: 1, color: C.dim }}>{x.date}</span><span style={{ fontWeight: 600 }}>{x.weight} lb</span>
            <button onClick={() => setBwLog(bwLog.filter((b) => b.id !== x.id))} style={{ background: "none", border: "none", color: C.dim, cursor: "pointer" }}>×</button>
          </div>
        ))}
      </Panel>

      <Panel title="Cardio" sub="Mostly zone 2 — protect leg recovery">
        <div style={{ display: "flex", gap: 8, alignItems: "flex-end", marginBottom: 10, flexWrap: "wrap" }}>
          <input type="date" value={cd.date} onChange={(e) => setCd({ ...cd, date: e.target.value })} style={inp(120)} />
          <select value={cd.type} onChange={(e) => setCd({ ...cd, type: e.target.value })} style={inp(110)}>
            {["Bike", "Incline Walk", "Run", "Rower", "Jump Rope", "Stairs", "Other"].map((t) => <option key={t}>{t}</option>)}
          </select>
          <MiniIn value={cd.minutes} onChange={(v) => setCd({ ...cd, minutes: v })} suffix="min" />
          <button onClick={addCd} style={btnSm()}>+ Log</button>
        </div>
        {cardioLog.slice(0, 4).map((x) => (
          <div key={x.id} style={{ display: "flex", gap: 10, padding: "5px 0", fontSize: 13, borderBottom: `1px solid ${C.line}` }}>
            <span style={{ flex: 1 }}>{x.type}<span style={{ color: C.dim, fontSize: 11 }}> · {x.date}</span></span>
            <span style={{ fontWeight: 600, color: C.gold }}>{x.minutes} min</span>
            <button onClick={() => setCardioLog(cardioLog.filter((c) => c.id !== x.id))} style={{ background: "none", border: "none", color: C.dim, cursor: "pointer" }}>×</button>
          </div>
        ))}
      </Panel>
    </>
  );
}

/* ============ TOOLS ============ */
function Tools({ mode, plates, bar, roundLoad, maxes }) {
  const [conv, setConv] = useState({ weight: 315, reps: 4 });
  const [warm, setWarm] = useState({ target: 315 });
  const e = epley(Number(conv.weight) || 0, Number(conv.reps) || 1);
  const warmups = useMemo(() => {
    const t = Number(warm.target) || 0;
    if (!t) return [];
    return [
      { pct: "bar", w: bar, r: 10 },
      { pct: "40%", w: roundLoad(t * 0.4), r: 8 },
      { pct: "60%", w: roundLoad(t * 0.6), r: 5 },
      { pct: "75%", w: roundLoad(t * 0.75), r: 3 },
      { pct: "85%", w: roundLoad(t * 0.85), r: 2 },
      { pct: "92%", w: roundLoad(t * 0.92), r: 1 },
    ].filter((x, i, arr) => i === 0 || x.w > arr[i - 1].w);
  }, [warm, bar, roundLoad]);

  return (
    <>
      <Panel title="Warm-Up Builder" sub="Enter your top-set weight — get the full ramp">
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 13, color: C.dim }}>Top set</span>
          <MiniIn value={warm.target} onChange={(v) => setWarm({ target: v })} suffix="lb" />
        </div>
        {warmups.map((w, i) => (
          <div key={i} style={{ padding: "7px 0", borderBottom: `1px solid ${C.line}` }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontSize: 13 }}><b style={{ color: C.gold }}>{w.pct}</b> × {w.r}</span>
              <span style={{ fontWeight: 700 }}>{w.w} lb</span>
            </div>
            <LoadChips total={w.w} bar={bar} plates={plates} />
          </div>
        ))}
      </Panel>

      <Panel title="Rep ⇄ Load Converter" sub="A set you hit → est. 1RM → loads at every rep target">
        <div style={{ display: "flex", gap: 8, alignItems: "center", marginBottom: 12 }}>
          <MiniIn value={conv.weight} onChange={(v) => setConv({ ...conv, weight: v })} suffix="lb" />
          <span style={{ color: C.dim }}>×</span>
          <MiniIn value={conv.reps} onChange={(v) => setConv({ ...conv, reps: v })} suffix="reps" />
          <div style={{ flex: 1, background: "rgba(225,29,42,.13)", border: `1px solid ${C.red}`, borderRadius: 8, padding: "7px 10px", textAlign: "center" }}>
            <div style={{ fontSize: 9, color: C.dim }}>EST. 1RM</div>
            <div style={{ fontSize: 18, fontWeight: 700 }}>{Math.round(e)}</div>
          </div>
        </div>
        {[3, 5, 8, 10, 12].map((r) => {
          const w = roundLoad(wForReps(e, r));
          return (
            <div key={r} style={{ padding: "7px 0", borderBottom: `1px solid ${C.line}` }}>
              <div style={{ display: "flex", justifyContent: "space-between" }}>
                <span style={{ fontSize: 13 }}><b style={{ color: C.gold }}>{r}</b> reps</span>
                <span style={{ fontWeight: 700 }}>{w} lb</span>
              </div>
              <LoadChips total={w} bar={bar} plates={plates} />
            </div>
          );
        })}
      </Panel>

      <Panel title="Training Maxes" sub="90% of 1RM — what working sets calculate from">
        {LIFTS.map((l) => (
          <div key={l.key} style={{ display: "flex", justifyContent: "space-between", padding: "7px 0", borderBottom: `1px solid ${C.line}`, fontSize: 14 }}>
            <span>{l.name}</span>
            <span><b style={{ color: C.gold }}>{Math.round(maxes[l.key] * 0.9)}</b> <span style={{ color: C.dim, fontSize: 11 }}>TM</span> · {maxes[l.key]} <span style={{ color: C.dim, fontSize: 11 }}>1RM</span></span>
          </div>
        ))}
      </Panel>
    </>
  );
}

/* ============ SHARED UI ============ */
const inp = (w) => ({ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 6, color: C.txt, padding: "8px 10px", fontSize: 13, width: w, fontFamily: "'Archivo',sans-serif", outline: "none" });
const btnSm = () => ({ padding: "9px 14px", background: C.red, border: "none", borderRadius: 8, color: "#fff", fontWeight: 700, cursor: "pointer", fontSize: 12 });
function Panel({ title, sub, children }) {
  return (
    <section style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 14, padding: "16px 14px", marginBottom: 14 }}>
      <div className="ttl" style={{ fontSize: 15.5, fontWeight: 600 }}>{title}</div>
      {sub && <div style={{ fontSize: 11.5, color: C.dim, margin: "3px 0 13px" }}>{sub}</div>}
      {children}
    </section>
  );
}
function Badge({ color, children }) {
  return <span style={{ background: `${color}26`, color, fontSize: 9, fontWeight: 700, padding: "1px 6px", borderRadius: 4, marginLeft: 6, letterSpacing: 0.5, verticalAlign: "middle" }}>{children}</span>;
}
function Stat({ label, value, color }) {
  return (
    <div style={{ flex: 1, background: C.panel2, borderRadius: 10, padding: "12px 6px" }}>
      <div className="ttl" style={{ fontSize: 20, fontWeight: 700, color }}>{value}</div>
      <div style={{ fontSize: 10, color: C.dim, textTransform: "uppercase", letterSpacing: 0.5, marginTop: 2 }}>{label}</div>
    </div>
  );
}
function MiniIn({ value, onChange, suffix }) {
  return (
    <div style={{ display: "flex", alignItems: "center", background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 6, padding: "0 8px", width: 86 }}>
      <input type="number" value={value} onChange={(e) => onChange(e.target.value === "" ? "" : Number(e.target.value))}
        style={{ width: "100%", background: "transparent", border: "none", outline: "none", color: C.txt, fontSize: 14, fontWeight: 600, padding: "8px 0", fontFamily: "'Archivo',sans-serif" }} />
      {suffix && <span style={{ fontSize: 9, color: C.dim, marginLeft: 3, whiteSpace: "nowrap" }}>{suffix}</span>}
    </div>
  );
}
function LoadChips({ total, bar, plates }) {
  const { total: got, counts } = solveLoadout(total, Number(bar), plates);
  const order = [55, 45, 35, 25, 10, 5, 2.5].filter((w) => counts[w]);
  const off = got - total;
  return (
    <div style={{ display: "flex", flexWrap: "wrap", gap: 4, alignItems: "center", marginTop: 3 }}>
      {order.length === 0 && <span style={{ color: C.dim, fontSize: 11 }}>bar only</span>}
      {order.map((w) => (
        <span key={w} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 4, padding: "1px 6px", fontSize: 11 }}>
          {counts[w]}× <b style={{ color: C.gold }}>{w}</b>/s</span>
      ))}
      <span style={{ color: off === 0 ? C.green : C.gold, fontSize: 10.5 }}>= {got}{off ? ` (${off > 0 ? "+" : ""}${off})` : " ✓"}</span>
    </div>
  );
}
function Empty({ text }) {
  return <div style={{ color: C.dim, fontSize: 13, textAlign: "center", padding: "14px 0" }}>{text}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(IronDesk));

</script>
</body>
</html>
